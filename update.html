<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Profile</title>
    <link rel="stylesheet" href="update.css">
    <link rel="icon" type="image/x-icon" href="images/artisthubLogo.png">
    <link rel="./output.css" href="output.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://unpkg.com/swiper/swiper-bundle.min.css" rel="stylesheet">
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
</head>
<body>

  <header class="fixed flex justify-between items-center top-0 left-0 right-0 z-50 p-1 glass-header">
        <div class="logo">
            <img src="images/artisthubLogo.png" alt="Artist Hub Logo">
        </div>
          </header>

    <main>
        <section class="profile-section">
            <div class="profile-container">
                <div class="profile-image">
                    <img class="artstImg" src="https://github.com/ALmiiiii/ArtistHub-BaguioCity/blob/master/artists/kidlat%20tahimik.jpg?raw=true" alt="artist 1">
        
                    <div class="options-section">
                        <button class="option-btn" input type="file" id="myFile" name="filename" input="submit">Change Profile</button>
                        <button class="option-btn" onclick="location.href='profile.html'">Save</button>
                    </div>
        
                    <div class="social-media">
                        <a href="#" class="fa fa-facebook"></a>
                        <a href="#" class="fa fa-instagram"></a>
                        <a href="#" class="fa fa-youtube"></a>
                        <a href="#" class="fa fa-google"></a>
                    </div>
                </div>
        
                <div class="profile-details">                    
                    <div class="content">
                        <!-- Registration form -->
                        <form action="#">
                          <div class="user-details">
                            <!-- Input for Full Name -->
                            <div class="input-box">
                              <span class="details">Full Name</span>
                              <input type="text" placeholder="Enter your name" required>
                            </div>
                            <!-- Input for Username -->
                            <div class="input-box">
                              <span class="details">Username</span>
                              <input type="text" placeholder="Enter your username" required>
                            </div>
                            <!-- Input for Email -->
                            <div class="input-box">
                              <span class="details">Email</span>
                              <input type="text" placeholder="Enter your email" required>
                            </div>
                            <!-- Input for Phone Number -->
                            <div class="input-box">
                              <span class="details">Phone Number</span>
                              <input type="text" placeholder="Enter your number" required>
                            </div>
                            <!-- Input for Password -->
                            <div class="input-box">
                              <span class="details">Password</span>
                              <input type="text" placeholder="Enter your password" required>
                            </div>
                            <!-- Input for Confirm Password -->
                            <div class="input-box">
                              <span class="details">Confirm Password</span>
                              <input type="text" placeholder="Confirm your password" required>
                            </div>
                            <!--Input for Bio-->
                            <div class="bio-box">
                              <span class="details">Bio-Information</span>
                              <input type="text" placeholder="Edit your Bio">
                          </div>
                          </div>
                          <div class="gender-details">
                            <!-- Radio buttons for gender selection -->
                            <input type="radio" name="gender" id="dot-1">
                            <input type="radio" name="gender" id="dot-2">
                            <input type="radio" name="gender" id="dot-3">
                            <span class="gender-title">Gender</span>
                            <div class="category">
                              <!-- Label for Male -->
                              <label for="dot-1">
                                <span class="dot one"></span>
                                <span class="gender">Male</span>
                              </label>
                              <!-- Label for Female -->
                              <label for="dot-2">
                                <span class="dot two"></span>
                                <span class="gender">Female</span>
                              </label>
                              <!-- Label for Prefer not to say -->
                              <label for="dot-3">
                                <span class="dot three"></span>
                                <span class="gender">Prefer not to say</span>
                              </label>
                            </div>
                          </div>              
                    </div>
                    
        </section>
        
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
