    <link href="https://unpkg.com/swiper/swiper-bundle.min.css" rel="stylesheet">
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
</head>

<body>
  <header class="fixed flex justify-between items-center top-0 left-0 right-0 z-50 p-1 glass-header">
    <div class="flex w-24 ml-5">
        <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/artisthubLogo.png?raw=true" alt="Artist Hub Logo" onclick="index.html">
    </div>
    <div class="nav-bar">
            <nav>
                <ul class="nav-list flex gap-5 text-black text-md p-2">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="#artists">Artists</a></li>
                    <li><a href="#events">Events</a></li>
                    <li><a href="#">Login</a></li>
                    </li>
                </ul>
            </nav>
    </div>
</header>

    <main>

      <div class="w-full relative">
        <div class="my-32 swiper centered-slide-carousel swiper-container relative">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <div class="relative bg-indigo-50 rounded-2xl rotate-6 h-96 flex justify-center items-center">
                <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/carousel/Art-festival-amid-a-pandemic.jpg?raw=true" alt="Slide 1" 
                class="absolute object-cover h-full w-full rounded-2xl z-0"/>
              </div>
            </div>
            <div class="swiper-slide">
              <div class="bg-indigo-50 rounded-2xl h-96 flex justify-center items-center">
                <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/carousel/GBC_BAGUIO16_NORTHERN78.jpg?raw=true" alt="Slide 2" class="object-cover h-full w-full rounded-2xl" />
              </div>
            </div>
            <div class="swiper-slide">
              <div class="bg-indigo-50 rounded-2xl h-96 flex justify-center items-center">
                <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/carousel/INDIO-GENIUS-500-Taon-ng-Labanang-Kultural-1521-2021-9-photo-by-Michelle-Anne-P.-Soliman-1-scaled.jpg?raw=true" alt="Slide 3" class="object-cover h-full w-full rounded-2xl" />
              </div>
            </div>
            <div class="swiper-slide">
              <div class="bg-indigo-50 rounded-2xl h-96 flex justify-center items-center">
                <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/carousel/Screen-Shot-2019-11-22-at-3.22.59-PM.png?raw=true" alt="Slide 4" class="object-cover h-full w-full rounded-2xl" />
              </div>
            </div>
            <div class="swiper-slide">
              <div class="bg-indigo-50 rounded-2xl h-96 flex justify-center items-center">
                <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/carousel/Screen-Shot-2019-11-22-at-3.23.25-PM.png?raw=true" alt="Slide 5" class="object-cover h-full w-full rounded-2xl" />
              </div>
            </div>
            <div class="swiper-slide">
              <div class="bg-indigo-50 rounded-2xl h-96 flex justify-center items-center">
                <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/carousel/Screen-Shot-2019-11-22-at-3.23.35-PM.png?raw=true" alt="Slide 6" class="object-cover h-full w-full rounded-2xl" />
              </div>
            </div>
            <div class="swiper-slide">
              <div class="bg-indigo-50 rounded-2xl h-96 flex justify-center items-center">
                <img src="https://github.com/Larkaholic/ArtistHub-BaguioCity/blob/new-branch/images/carousel/ibagiw3-1574050165.jpg?raw=true" alt="Slide 6" class="object-cover h-full w-full rounded-2xl" />
              </div>
            </div>
          </div>
          <div class="flex items-center gap-8 lg:justify-start justify-center">
            <button id="slider-button-left" class="swiper-button-prev group !p-6 flex justify-center items-center border border-solid border-black !w-12 !h-12 transition-all duration-500 rounded-full !top-2/4 !-translate-y-8 !left-5 hover:bg-green-700 " data-carousel-prev>
              <svg class="h-5 w-5 text-green-900 group-hover:text-black" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M10.0002 11.9999L6 7.99971L10.0025 3.99719" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
            <button id="slider-button-right" class="swiper-button-next group !p-6 flex justify-center items-center border border-solid border-black !w-12 !h-12 transition-all duration-500 rounded-full !top-2/4 !-translate-y-8  !right-5 hover:bg-green-700" data-carousel-next>
              <svg class="h-5 w-5 text-green-900 group-hover:text-black" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M5.99984 4.00012L10 8.00029L5.99748 12.0028" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
           </div>
          <div class="swiper-pagination"></div>
        </div>
      </div>
