<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="./output.css" href="output.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://unpkg.com/swiper/swiper-bundle.min.css" rel="stylesheet">
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>

</head>
<body class="bg-cover">
    <div class="loader loader--hidden"></div>

    <header class="fixed flex justify-between items-center top-0 left-0 right-0 z-50 p-1 glass-header">
        <div class="flex w-24 ml-5">
            <img src="images/artisthubLogo.png" alt="Artist Hub Logo" onclick="landingPage()">
        </div>
        <div class="nav-bar">
          <div class="nav-container">
              <nav>
                  <div class="nav-mobile">
                      <a href="#" id="nav-toggle">
                          <span></span>
                      </a>
                  </div>
                  <ul class="nav-list">
                      <li><a href="#artist">Artists</a></li>
                      <li><a href="#events">Events</a></li>
                      <li><a href="gallery.html">Gallery</a></li>
                      <li><a href="login.html">Login</a></li>
                      </li>
                      
                  </ul>
              </nav>
          </div>
      </div>
    </header>

    <main>
      <section id="landingPage" class="container flex flex-col md:flex-row content-between items-center w-full px-4 py-6 truncate overflow-auto">
        <div class="big flex flex-1 content-start mb-6 md:mb-12 mt-10 md:mt-20">
            <img src="images/trial1.png" alt="Artist Hub Logo" class="w-full max-w-xs md:max-w-md lg:max-w-2xl">
        </div>
        <div class="events flex-1 p-4 sm:w-full sm:mb-0 md:p-6 mt-6 md:mt-0 mb-6 bg-slate-400 text-white rounded-md glass-header">
            <h2 class="text-2xl md:text-3xl lg:text-4xl mb-4 md:mb-6 text-center">IMPORTANT EVENTS</h2>
            <div class="event-list flex flex-col gap-4 md:gap-6">
                <div class="event-item flex flex-col items-center md:flex-row md:items-start gap-2">
                    <img src="images/ibagiw.jpg" alt="iBagiw Competition" class="w-14 h-14 md:w-14 md:h-14 rounded-md object-cover">
                    <p class="text-center md:text-left">iBagiw Competition</p>
                </div>
                <div class="event-item flex flex-col items-center md:flex-row md:items-start gap-2">
                    <img src="images/ibagiw.jpg" alt="Nurturing the Environment" class="w-14 h-14 md:w-14 md:h-14 rounded-md object-cover">
                    <p class="text-center md:text-left">Nurturing the Environment</p>
                </div>
                <div class="event-item flex flex-col items-center md:flex-row md:items-start gap-2">
                    <img src="images/ibagiw.jpg" alt="iBagiw Competition" class="w-14 h-14 md:w-14 md:h-14 rounded-md object-cover">
                    <p class="text-center md:text-left">iBagiw Competition</p>
                </div>
            </div>
        </div>
      </section>
    
        <!-- artists -->
      <section id="artists" class="artists-highlight flex flex-col content-center mt-8 w-full truncate">
        <div class="relative flex justify-end w-full">
          <input
            class="appearance-none border-2 pl-4 border-gray-300 hover:border-gray-400 transition-colors rounded-md w-56 py-2 px-3 mt-11 text-gray-800 leading-tight focus:outline-none focus:ring-purple-600 focus:border-purple-600 focus:shadow-outline"
            id="username"
            type="text"
            placeholder="Search for artist"
          />
        </div>
        <div class="artist-container flex justify-between mt-8 w-full">
          <div class="artist-item">
            <img src="artists/kidlat tahimik.jpg" alt="KidlatTahimik">
            <button class="bttn" type="button" onclick="location.href='profile.html'"><p>Read More >>></p></button>
          </div>
          <div class="artist-item">
            <img src="artists/bencab.jpg" alt="bencab">
            <button class="bttn" type="button" onclick="location.href='profile.html'"><p>Read More >>></p></button>
          </div>
          <div class="artist-item">
            <img src="artists/wang-od.webp" alt="wang-od">
            <button class="bttn" type="button" onclick="location.href='profile.html'"><p>Read More >>></p></button>
          </div>
        </div>
      </section>
        
        <!-- Events -->
      <section id="events" class="EvntPage">
          <container class="EvntContainer xs:mt-24 overflow-auto">
              <h2 class="EvntTitle">
                  UPCOMING EVENTS
              </h2>
              <button class="EvntRow">
                  No event yet
              </button>
              <button class="EvntRow">
                  No event yet
              </button>
              <button class="EvntRow">
                  No event yet
              </button>
              <button class="EvntRow">
                  No event yet
              </button>
              <button class="EvntRow">
                  No event yet
              </div>
              <button class="EvntRow">
                  No event yet
              </button>
          </container>
      </section>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="script.js"></script>
    <script>
      window.addEventListener("load",() => {
      const loader = document.querySelector(".loader");
      loader.classList.add("loader--hidden");
      loader.addEventListener("transitioned", () => {
        document.bodu.removeChild(document.querySelector(".loader"));
      });

      });
    </script>
</body>
</html>
