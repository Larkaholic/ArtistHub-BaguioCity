<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Hub</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="./output.css" href="output.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://unpkg.com/swiper/swiper-bundle.min.css" rel="stylesheet">
    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="admin.css">
    <link rel="./output.css" href="output.css">

</head>
<body class="bg-cover">
  <div class="loader loader--hidden"></div>

  <header class="fixed flex justify-between items-center top-0 left-0 right-0 z-50 p-1 glass-header">
      <div class="flex w-24 ml-5">
          
      </div>
      <div class="nav-bar">
        <div class="nav-container">
            <nav>
                <div class="nav-mobile">
                    <a href="#" id="nav-toggle">
                        <span></span>
                    </a>
                </div>
                <ul class="nav-list">
                    <li><a href="" onclick="toggleLoginFlyout(event)">Login</a></li>
                    </li>
                    
                </ul>
            </nav>
        </div>
    </div>
    </header>

    <div id="LoginFlyout" class="flyout fixed inset-0 flex items-center justify-center bg-gray-500 bg-opacity-50 z-50">
        <div class="glass-header items-center rounded-lg w-96 mx-10">
            <h2 class="flex justify-center font-bold text-2xl my-4">Login</h2>
            <form>
                <div class="mx-2 mb-4">
                    <label for="email" class="block font-medium">Email:</label>
                    <input type="email" id="email" class="block mt-1 p-2 border border-gray-400 rounded-md w-full" placeholder="Enter Email" required>
                </div>
                <div class="mx-2 mb-4">
                    <label for="password" class="block font-medium">Password:</label>
                    <input type="password" name="password" id="password" class="block mt-1 p-2 border border-gray-400 rounded-md w-full" placeholder="Enter Password" required>
                </div>
                <div class="flex items-center justify-between mx-20 my-5">
                    <button type="button" class="glass-header text-white py-2 px-4 rounded-md hover:bg-gray-300 hover:text-black" onclick="submitLogin()">Login</button>
                    <button type="button" class="glass-header text-white py-2 px-4 rounded-md hover:bg-gray-300 hover:text-black" onclick="toggleLoginFlyout()">Close</button>
                </div>
            </form>
        </div>
    </div>

    <section class="sidebar">
        <div class="img">
            <img src="images/trial1.png">
            </div>
        <button class="genbttn" type="button" onclick="location.href='gen.html'"><p>General Settings</p></button>
        <button class="usbttn" type="button" onclick="location.href='user.html'"><p>User Dashboard</p></button>
        <button class="artbttn" type="button" onclick="location.href='.html'"><p>Artist Dashboard</p></button>
        <button class="evebttn" type="button" onclick="location.href='eve.html'"><p>Event Dashboard</p></button>
        <button class="cubttn" type="button" onclick="location.href='.html'"><p>Customer Support</p></button>
        <button class="aubttn" type="button" onclick="location.href='.html'"><p>Audit Logs</p></button>
        <button class="apbttn" type="button" onclick="location.href='.html'"><p>API settings</p></button>        
        <button class="sobttn" type="button" onclick="location.href='index.html'"><p>Sign-out</p></button>



    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="script.js"></script>
    <script>
      window.addEventListener("load",() => {
      const loader = document.querySelector(".loader");
      loader.classList.add("loader--hidden");
      loader.addEventListener("transitioned", () => {
        document.bodu.removeChild(document.querySelector(".loader"));
      });

      });
    </script>
</body>
</html>
